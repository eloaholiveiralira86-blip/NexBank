<!DOCTYPE HTML> 
<!--TITULO AQUI DA PAGINA {MAIOR DESTAQUE}--> 
<html lang="pt-br">

<head> 
    <meta charset=UTF-8>
    <title>NexBank</title>

<link rel="stylesheet" href="style.css">
</head>

 <body>
<div class="container"> <!--Agrupa tudo como se fosse um celular-->

<!--Bloco 1: Topo --> 
<div class="Topo"> <!--Div= caixa/ bloco gemerico-->
 <h1>Banco NexBank</h1>
 <p>Seu Dinheiro seguro</p> <!--descrição-->
</div>


 <!--bloco 2: Salto-->
 <div class="salto">
    <span>Salto</span><!--melhora o alinhamento-->
    <h2>R$ 2.000,00</h2>
 </div>


 <!--Bloco 3: acoes-->
 <div class="acoes">
    <button>transferir </button> 
    <button>pagar</button>
    <button>extrato</button>
 </div>

 <!--Blocos 4: transacoes-->
 <div class="transacoes">
  <!--cada transação virou um bloco seperado-->

<div class="item">

   <span>Pix enviado</span>
   <span>R$100,00</span>
   </div>

   <div class="item">

<span>Boleto Pago</span>
<span>-R$200,00</span> 
</div>

<!--Terceira transação-->
<div class="item">
   <span>tranferencia recebido</span><!--Descrição-->
   <span>- R$200</span><!--valor-->
</div class="item">



<!--bloco extra tipo app-->
<div class="card">
   <p>Cartão de Crédito</p>
   <h3>R$ 500,00</h3>
</div><!--Fim container-->

<!--bloco extra com dica visual-->
<div class="card destaque">
   <p>Dica inteligente</p> <!--TITULO-->
   <H3>voce gastou menos essa semada</H3><!--mensagem-->
   <span>continua economizando</span><!--texto de apoio-->
</div>


 </body>
 </html>
